<!DOCTYPE html>
<html>
<head>
    <title>Catch The Thief</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="step1">
    <h2>Enter Your Name</h2>
    <input id="name" placeholder="Your Name">
    <button onclick="goIn()">Go In</button>
</div>

<div id="step2" style="display:none;">
    <h2>Welcome <span id="playerName"></span></h2>

    <button onclick="showCreate()">Create Room</button>
    <button onclick="showJoin()">Join Room</button>
</div>

<div id="createRoomDiv" style="display:none;">
    <h3>Create Room</h3>
    <input id="createRoomName" placeholder="Room Name">
    <button onclick="createRoom()">Create</button>
</div>

<div id="joinRoomDiv" style="display:none;">
    <h3>Join Room</h3>
    <input id="joinRoomName" placeholder="Room Name">
    <button onclick="joinRoom()">Join</button>
</div>

<div id="game" style="display:none;">
    <h2 id="roomTitle"></h2>
    <h3 id="role"></h3>

    <div id="players"></div>

    <button id="startBtn" onclick="startGame()" style="display:none;">
        Start Game
    </button>

    <div id="policePanel" style="display:none;">
        <h3>Select Thief</h3>
        <div id="choices"></div>
        <button onclick="guess()">Do Game</button>
    </div>

    <h2 id="result"></h2>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
