<!DOCTYPE html>
<html>
<head>
    <title>Catch The Thief</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Catch The Thief 🕵️</h1>

<div id="step1">
    <input id="name" placeholder="Your Name">
    <button onclick="goIn()">Enter</button>
</div>

<div id="step2" style="display:none;">
    <h3>Welcome <span id="playerName"></span></h3>
    <button onclick="showCreate()">Create Room</button>
    <button onclick="showJoin()">Join Room</button>
</div>

<div id="createRoomDiv" style="display:none;">
    <input id="createRoomName" placeholder="Room Name">
    <button onclick="createRoom()">Create</button>
</div>

<div id="joinRoomDiv" style="display:none;">
    <input id="joinRoomName" placeholder="Room Name">
    <button onclick="joinRoom()">Join</button>
</div>

<div id="game" style="display:none;">
    <h2 id="roomTitle"></h2>
    <h3 id="role"></h3>
    <h3 id="policeName"></h3>

    <div id="players"></div>

    <button id="startBtn" onclick="startGame()" style="display:none;">Start Game</button>

    <div id="policePanel" style="display:none;">
        <h3>Select Thief</h3>
        <div id="choices"></div>
        <button onclick="guess()">Catch Thief</button>
    </div>

    <h2 id="result"></h2>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
